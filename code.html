<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Commerce Store</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:#333;
    color:white;
    padding:15px;
    text-align:center;
}

nav{
    background:#444;
    padding:10px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:30px;
}

.product{
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.product img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:10px;
}

.product h3{
    margin:10px 0;
}

.price{
    color:green;
    font-size:20px;
    margin:10px 0;
}

button{
    background:#28a745;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#218838;
}

footer{
    background:#333;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:20px;
}
</style>
</head>

<body>

<header>
    <h1>Online Shopping Store</h1>
    <p>Shop Your Favorite Products</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Cart</a>
    <a href="#">Contact</a>
</nav>

<section class="products">

    <div class="product">
        <img src="https://via.placeholder.com/250x200" alt="Product 1">
        <h3>Smart Phone</h3>
        <p class="price">₹15,999</p>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/250x200" alt="Product 2">
        <h3>Laptop</h3>
        <p class="price">₹45,999</p>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/250x200" alt="Product 3">
        <h3>Headphones</h3>
        <p class="price">₹1,999</p>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/250x200" alt="Product 4">
        <h3>Smart Watch</h3>
        <p class="price">₹3,999</p>
        <button>Add to Cart</button>
    </div>

</section>

<footer>
    <p>&copy; 2026 E-Commerce Store. All Rights Reserved.</p>
</footer>

</body>
</html>
